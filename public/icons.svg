<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" role="img" aria-label="DraftBird logo">
  <title>DraftBird</title>

  <!-- Rounded square container -->
  <rect width="240" height="240" rx="54" fill="#0a0a0a"/>
  <rect x="0.5" y="0.5" width="239" height="239" rx="54" fill="none" stroke="#1f1f1f" stroke-width="1"/>

  <!-- Bird body — forward-leaning triangle, deep orange -->
  <path d="M 50 145 L 195 110 L 110 188 Z" fill="#ea580c"/>

  <!-- Bird wing — lighter orange triangle on top, suggesting flight -->
  <path d="M 75 55 L 200 112 L 130 130 Z" fill="#fb923c"/>

  <!-- Spark highlight on the beak -->
  <circle cx="195" cy="111" r="3" fill="#ffffff" opacity="0.95"/>
</svg>
